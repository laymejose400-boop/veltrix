<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pedidos | Veltrix Admin</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Nuestro CSS -->
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body>

    <canvas id="particulas"></canvas>
    <canvas id="canvasHielo" style="position: fixed; top: 0; left: 0; z-index: 9998; pointer-events: none;"></canvas>
<div class="cursor-hielo-punto" id="cursorHielo"></div>

    <!-- Barra de navegación admin -->
    <header class="navbar">
        <div class="navbar-contenedor">
            <a href="../index.html" class="logo">
    <img src="../imagenes/LOGO.png" alt="Veltrix" class="logo-img">
</a>
           <nav class="nav-links" id="navLinks">
    <div class="nav-bloque nav-acciones" style="margin-left: auto;">
        <a href="productos.html"><i class="fa-solid fa-box"></i> Productos</a>
        <a href="pedidos.html" class="activo"><i class="fa-solid fa-truck-fast"></i> Pedidos</a>
        <a href="contactos.html"><i class="fa-solid fa-message"></i> Mensajes</a>
        
        <div class="nav-usuario" id="navUsuario" style="display:none;">
            <button class="nav-usuario-btn" id="btnUsuario">
                <span id="linkNombre">👤 Admin</span>
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="nav-usuario-menu" id="menuUsuario">
                <a href="../perfil.html"><i class="fa-solid fa-user-gear"></i> Mi Perfil</a>
                <a href="#" onclick="cerrarSesion()"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
            </div>
        </div>

        <a href="../login.html" id="linkLogin"><i class="fa-solid fa-user"></i> Iniciar Sesión</a>

        <button id="btnTema" style="background:none; border:none; color: #ffffff; cursor:pointer; font-size:1.1rem;" onclick="cambiarTema()" title="Cambiar tema">
            <i class="fa-solid fa-palette"></i>
        </button>
    </div>
</nav>
        </div>
    </header>

    <main class="admin-contenedor">
        <h1 class="titulo-seccion" data-aos="fade-down">Gestión de Pedidos</h1>

        <div class="admin-tabla-contenedor" data-aos="fade-up">
            <table class="admin-tabla" id="tablaPedidos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbodyPedidos">
                    <!-- Se llena con JavaScript -->
                </tbody>
            </table>
            <div class="cargando" id="cargandoAdminPedidos">
                <div class="spinner-3d"></div>
                <p>Cargando pedidos...</p>
            </div>
        </div>
    </main>

    <!-- Modal para detalle del pedido y cambio de estado -->
    <div class="modal" id="modalPedido">
        <div class="modal-contenido auth-tarjeta" style="max-width: 600px;">
            <h3 class="resumen-titulo" id="modalPedidoTitulo">Detalle del Pedido</h3>
            <div id="modalPedidoContenido"></div>
            <div class="auth-form" style="margin-top:20px;">
                <label>Cambiar Estado</label>
                <select id="nuevoEstado" style="background: rgba(0,0,0,0.3); border: 1px solid var(--borde); border-radius: 12px; padding: 14px; color: var(--texto-claro); font-family: var(--fuente-texto); width:100%; margin:10px 0;">
                    <option value="PENDIENTE">PENDIENTE</option>
                    <option value="CONFIRMADO">CONFIRMADO</option>
                    <option value="ENVIADO">ENVIADO</option>
                    <option value="ENTREGADO">ENTREGADO</option>
                    <option value="CANCELADO">CANCELADO</option>
                </select>
                <button class="boton-auth" onclick="cambiarEstadoPedido()">Actualizar Estado</button>
                <button class="btn-detalle" style="width:100%; margin-top:10px;" onclick="document.getElementById('modalPedido').classList.remove('visible')">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../js/particulas.js"></script>
    <script src="../js/cursor-hielo.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin-pedidos.js"></script>

    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
