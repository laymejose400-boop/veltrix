<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido | Veltrix Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020814;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .loading-admin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 0.6s ease;
        }
        .loading-admin.oculto { opacity: 0; pointer-events: none; }
        .loading-circulo {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,255,255,0.1); border-top-color: #00d4ff;
            border-radius: 50%; animation: girar 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes girar { to { transform: rotate(360deg); } }
        .loading-texto {
            color: #888; font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem; letter-spacing: 4px;
            animation: pulso 1.5s ease-in-out infinite;
        }
        @keyframes pulso { 0%,100%{opacity:0.4} 50%{opacity:1} }

        model-viewer {
            position: fixed; top: 5vh; left: 50%;
            transform: translateX(-50%) translateY(-120px);
            width: 80vw; max-width: 700px; height: 55vh;
            z-index: 1; opacity: 0;
            transition: opacity 1s ease, transform 1s ease;
        }
        model-viewer.visible {
            opacity: 1; transform: translateX(-50%) translateY(0);
        }

        .texto-flotante {
            position: fixed; bottom: 60px; left: 50%;
            transform: translateX(-50%) translateY(30px);
            z-index: 2; text-align: center; opacity: 0;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .texto-flotante.visible {
            opacity: 1; transform: translateX(-50%) translateY(0);
        }

        .bienvenida-titulo {
            font-family: 'Orbitron', sans-serif; font-size: 2.2rem;
            color: #fff; letter-spacing: 3px; text-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .bienvenida-titulo span {
            background: linear-gradient(135deg, #00d4ff, #7b2fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .bienvenida-subtitulo { color: #ccc; font-size: 1rem; margin: 8px 0 24px; text-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .bienvenida-boton {
            display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, #00d4ff, #7b2fff); color: #fff;
            padding: 14px 32px; border-radius: 50px; font-weight: 700;
            text-decoration: none; font-size: 1rem; letter-spacing: 1px;
            transition: 0.4s; box-shadow: 0 4px 25px rgba(0, 212, 255, 0.4);
        }
        .bienvenida-boton:hover { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(0, 212, 255, 0.7); }
    </style>
</head>
<body>

    <div class="loading-admin" id="loadingAdmin">
        <div class="loading-circulo"></div>
        <div class="loading-texto">Cargando Panel</div>
    </div>

    <model-viewer 
        id="auto3d"
        src="../modelos/bmw1.glb"
        auto-rotate camera-controls interaction-prompt="none"
        exposure="1.4" shadow-intensity="0.5" environment-image="neutral"
        camera-orbit="30deg 70deg 8m" field-of-view="35deg">
    </model-viewer>

    <div class="texto-flotante" id="textoFlotante">
        <h1 class="bienvenida-titulo">Bienvenido, <span>Administrador</span></h1>
        <p class="bienvenida-subtitulo">Panel de Control Veltrix</p>
        <a href="productos.html" class="bienvenida-boton">
            <i class="fa-solid fa-gauge-high"></i> Acceder al Panel
        </a>
    </div>

    <script>
        setTimeout(function() {
            document.getElementById('loadingAdmin').classList.add('oculto');
            document.getElementById('auto3d').classList.add('visible');
            document.getElementById('textoFlotante').classList.add('visible');
        }, 2000);
    </script>

</body>
</html>
