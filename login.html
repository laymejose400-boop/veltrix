<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Veltrix</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Nuestro CSS -->
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <!-- Fondo de partículas animadas -->
    <canvas id="particulas"></canvas>
    <canvas id="canvasHielo" style="position: fixed; top: 0; left: 0; z-index: 9998; pointer-events: none;"></canvas>
    <div class="cursor-hielo-punto" id="cursorHielo"></div>

    <!-- Barra de navegación simplificada para login -->
<header class="navbar">
    <div class="navbar-contenedor">
        <a href="index.html" class="logo">
    <img src="imagenes/LOGO.png" alt="Veltrix" class="logo-img">
</a>
        <nav class="nav-links" style="display: flex; align-items: center; gap: 15px; justify-content: flex-end; width: 100%; padding-right: 24px;">
    <a href="index.html">Inicio</a>
    <a href="registro.html">Registrarse</a>
    <button id="btnTema" style="background:none; border:none; color: #ffffff; cursor:pointer; font-size:1.1rem;" onclick="cambiarTema()" title="Cambiar tema">
        <i class="fa-solid fa-palette"></i>
    </button>
</nav>
    </div>
</header>

    <!-- Contenido principal: tarjeta de login -->
    <main class="auth-contenedor">
        <div class="auth-tarjeta" data-aos="zoom-in" data-aos-duration="600">
            <!-- Icono de usuario con efecto -->
            <div class="auth-icono">
                <div class="auth-icono-circulo">
                    <i class="fa-solid fa-user-astronaut"></i>
                </div>
            </div>

            <h2 class="auth-titulo">Bienvenido de nuevo</h2>
            <p class="auth-subtitulo">Ingresa a tu cuenta Veltrix</p>

            <!-- Formulario de login -->
            <form id="formLogin" class="auth-form">
                <div class="input-grupo">
                    <label for="email"><i class="fa-solid fa-envelope"></i> Correo electrónico</label>
                    <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
                </div>

                <div class="input-grupo">
                    <label for="password"><i class="fa-solid fa-lock"></i> Contraseña</label>
                    <div class="input-password">
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Mensaje de error (oculto por defecto) -->
                <div class="auth-error" id="errorLogin" style="display: none;"></div>

                <button type="submit" class="boton-auth" id="btnLogin">
                    <span>Iniciar Sesión</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <p class="auth-redireccion">
                ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
            </p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/particulas.js"></script>
    <script src="js/cursor-hielo.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>

    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
